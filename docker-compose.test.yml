version: '3.8'

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: vibe-rag-test-db
    environment:
      POSTGRES_USER: vibetest
      POSTGRES_PASSWORD: vibetest123
      POSTGRES_DB: vibe_rag_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibetest -d vibe_rag_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

volumes:
  postgres-test-data:
